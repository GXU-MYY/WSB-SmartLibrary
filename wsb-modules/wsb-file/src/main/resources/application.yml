server:
  port: 9600

spring:
  application:
    name: wsb-file
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

# 腾讯云 COS 配置（使用环境变量）
tencent:
  cos:
    secret-id: ${TENCENT_COS_SECRET_ID}
    secret-key: ${TENCENT_COS_SECRET_KEY}
    bucket: ${TENCENT_COS_BUCKET}
    region: ${TENCENT_COS_REGION}