server:
  port: 9100

spring:
  application:
    name: wsb-user
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/WSB?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379

wsb:
  sms:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}
    sign-name: "云渚科技验证平台"
    template-code: 100003
    scheme-name: "测试方案"

mybatis-plus:
  configuration:
    # 开启自动驼峰下划线转换
    map-underscore-to-camel-case: true

