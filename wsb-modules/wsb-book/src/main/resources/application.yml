server:
  port: 9200

spring:
  application:
    name: wsb-book
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/WSB?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 123456

mybatis-plus:
  configuration:
    # 开启自动驼峰下划线转换
    map-underscore-to-camel-case: true

# Google Books API 配置
google:
  books:
    base-url: https://www.googleapis.com/books/v1
    api-key: ${GOOGLE_BOOKS_API_KEY:}
    proxy:
      host: 127.0.0.1
      port: 7897

# 阿里云 ISBN API 配置
aliyun:
  isbn:
    base-url: https://jmisbn.market.alicloudapi.com
    app-code: ${ALIYUN_ISBN_APPCODE:}

# Feign 日志级别
logging:
  level:
    com.wsb.book.api.client: DEBUG
