server:
  port: 9400

spring:
  application:
    name: wsb-social
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/WSB?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 123456

  jackson:
    # 开启驼峰转下划线（Snake Case）
    property-naming-strategy: SNAKE_CASE