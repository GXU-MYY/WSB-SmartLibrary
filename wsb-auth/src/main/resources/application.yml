server:
  port: 9000

spring:
  application:
    name: wsb-auth
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  jwt-secret-key: wsbbackendsecretkeywsbbackendsecretkey32bits

wsb:
  sms:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}
    sign-name: "云渚科技验证平台"
    template-code: 100003
    scheme-name: "测试方案"